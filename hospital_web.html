<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HospitalDB — Management Console</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0f2f5;--surface:#fff;--surface2:#f7f8fa;--border:#e2e6ea;
  --text:#0d1117;--text2:#5a6474;--text3:#9ba4b0;
  --accent:#0a6eba;--accent-lt:#e8f2fc;
  --green:#05a67a;--yellow:#f59e0b;--red:#e03a3a;--purple:#7c3aed;
  --r:10px;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',system-ui,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden;height:100vh}
/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:224px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
/* Sidebar */
.logo{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.logo-title{font-size:15px;font-weight:600;letter-spacing:-.3px}
.logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.nav{padding:8px 6px;flex:1}
.nav-sec{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:12px 10px 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;color:var(--text2);font-size:13px;transition:all .12s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-lt);color:var(--accent);font-weight:500}
.nav-icon{width:18px;text-align:center;font-size:14px}
.nav-cnt{margin-left:auto;background:var(--bg);color:var(--text3);font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:9px}
.nav-item.active .nav-cnt{background:#d0e8f9;color:var(--accent)}
/* Topbar */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.topbar-info .ttl{font-size:16px;font-weight:600;letter-spacing:-.3px}
.topbar-info .sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.topbar-right{margin-left:auto;display:flex;gap:8px;align-items:center}
/* Content */
.content{flex:1;overflow-y:auto;padding:22px 24px}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px}
.sc-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
.sc-val{font-size:28px;font-weight:300;font-family:var(--mono);color:var(--text);letter-spacing:-1px;line-height:1}
.sc-meta{font-size:11px;margin-top:4px;color:var(--text3)}
.sc-meta.up{color:var(--green)}.sc-meta.warn{color:var(--yellow)}
/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-box{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 12px;flex:1;max-width:320px}
.search-box input{border:none;background:none;outline:none;font-size:13px;color:var(--text);font-family:var(--sans);width:100%}
.search-box input::placeholder{color:var(--text3)}
select.fsel{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--text2);font-family:var(--sans);outline:none;cursor:pointer}
/* Buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:7px;font-size:13px;font-family:var(--sans);cursor:pointer;border:none;font-weight:500;transition:all .12s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#085ea0}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#c02c2c}
.btn-outline{background:var(--surface);border:1px solid var(--border);color:var(--text2)}.btn-outline:hover{background:var(--accent-lt);border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:4px 9px;font-size:12px}
/* Table card */
.tc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tc-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.tc-title{font-size:14px;font-weight:600}
.tc-cnt{font-size:11px;color:var(--text3);font-family:var(--mono)}
table{width:100%;border-collapse:collapse}
th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#fafbfc}
.tdid{font-family:var(--mono);font-size:11px;color:var(--text3)}
.tdbold{font-weight:500;color:var(--text)}
.tdmono{font-family:var(--mono);font-size:12px}
.tdmuted{color:var(--text3);font-size:12px}
.acel{display:flex;gap:5px}
/* Badges */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;font-family:var(--mono)}
.bg{background:#e6f4ee;color:#0d7a46}.bb{background:#e8f2fc;color:#0a6eba}
.by{background:#fef6e4;color:#a86400}.br{background:#fde8e8;color:#b91c1c}
.bgr{background:#f0f2f5;color:#5a6474}.bp{background:#f0edfe;color:#5139b7}
.stars{color:#f59e0b;font-size:12px;letter-spacing:1px}
/* Avatar */
.av{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;margin-right:7px;flex-shrink:0}
.ncell{display:flex;align-items:center}
/* Pagination */
.pag{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;border-top:1px solid var(--border);font-size:11px;color:var(--text3)}
.pbtns{display:flex;gap:3px}
.pbtn{background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:3px 9px;font-size:11px;cursor:pointer;color:var(--text2);font-family:var(--sans)}
.pbtn:hover{background:var(--accent-lt);color:var(--accent);border-color:var(--accent)}
.pbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Modal */
.mb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;align-items:center;justify-content:center}
.mb.open{display:flex}
.modal{background:var(--surface);border-radius:14px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.mhd{padding:18px 22px 0;display:flex;align-items:center;justify-content:space-between}
.mtitle{font-size:15px;font-weight:600}
.mclose{background:none;border:none;font-size:20px;color:var(--text3);cursor:pointer;line-height:1;padding:0 2px}
.mclose:hover{color:var(--text)}
.mbody{padding:18px 22px}
.mfoot{padding:0 22px 18px;display:flex;justify-content:flex-end;gap:8px}
/* Form */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fgrid .full{grid-column:1/-1}
.fg{display:flex;flex-direction:column;gap:4px}
.flbl{font-size:11px;font-weight:500;color:var(--text2)}
.flbl span{color:var(--red);margin-left:2px}
.fi,.fsel,.fta{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-size:13px;color:var(--text);font-family:var(--sans);background:var(--surface);outline:none;transition:border .12s}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--accent)}
.fi.err{border-color:var(--red)}
.ferr{font-size:11px;color:var(--red);min-height:14px}
.fta{resize:vertical;min-height:64px}
/* Confirm */
.cfm-bk{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:300;align-items:center;justify-content:center}
.cfm-bk.open{display:flex}
.cfm{background:var(--surface);border-radius:12px;width:340px;padding:24px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.cfm-ico{font-size:32px;margin-bottom:10px}
.cfm-msg{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.cfm-btns{display:flex;gap:8px;justify-content:center}
/* Toast */
.toasts{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--text);color:#fff;padding:9px 14px;border-radius:8px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.2);animation:tin .2s ease}
.toast.ok{background:var(--green)}.toast.er{background:var(--red)}
@keyframes tin{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
/* Empty */
.empty{padding:40px;text-align:center;color:var(--text3)}
.empty .eico{font-size:32px;margin-bottom:10px}
/* Dashboard */
.dg{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.dct{font-size:13px;font-weight:600;margin-bottom:12px}
.brow{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:8px}
.blbl{width:130px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btrack{flex:1;background:var(--bg);border-radius:3px;height:6px;overflow:hidden}
.bfill{height:100%;border-radius:3px;transition:width .5s}
.bval{width:38px;text-align:right;font-family:var(--mono);font-size:10px;color:var(--text3)}
.srow{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)}
.srow:last-child{border:none}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px}
</style>
</head>

const AVCOLS=["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4"];
function avCol(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))%AVCOLS.length;return AVCOLS[h];}
function av(n){const i=n.replace("Dr. ","").split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();const c=avCol(n);return `<span class="av" style="background:${c}22;color:${c}">${i}</span>`;}
function sts(n){n=Math.round(n);return`<span class="stars">${"★".repeat(n)}${"☆".repeat(5-n)}</span>`;}
const BM={Completed:"bg",Scheduled:"bb",Cancelled:"br",Paid:"bg",Pending:"by",Failed:"br",Available:"bg",Busy:"by","Off-Duty":"bgr",Male:"bb",Female:"bg",Other:"bgr",ICU:"br",Operating:"by",Recovery:"bg",General:"bb",Consultation:"bgr",Occupied:"by",Maintenance:"br",Cash:"bgr",Card:"bb",Insurance:"bp"};
function bdg(v){return`<span class="bdg ${BM[v]||"bgr"}">${v}</span>`;}
function toast(msg,type="ok"){const t=document.createElement("div");t.className=`toast ${type}`;t.textContent=msg;document.getElementById("toasts").appendChild(t);setTimeout(()=>t.remove(),3000);}

let _cfmRes=null;
function confirm2(msg){
  document.getElementById("cfm-msg").textContent=msg;
  document.getElementById("cfm-bk").classList.add("open");
  return new Promise(r=>{_cfmRes=r;});
}
function cfmResolve(v){document.getElementById("cfm-bk").classList.remove("open");if(_cfmRes){_cfmRes(v);_cfmRes=null;}}

function openModal(id){document.getElementById(id).classList.add("open");}
function closeModal(id){
  document.getElementById(id).classList.remove("open");
  document.querySelectorAll(`#${id} .fi,#${id} .fsel,#${id} .fta`).forEach(e=>{e.value="";e.classList.remove("err");});
  document.querySelectorAll(`#${id} .ferr`).forEach(e=>e.textContent="");
  document.getElementById("edit-id").value="";
}

function deb(fn,d=280){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),d);};}

// Pagination
function pag(containerId,total,page,per,fn){
  const pages=Math.ceil(total/per),s=(page-1)*per+1,e=Math.min(page*per,total);
  let btns="";for(let i=1;i<=pages;i++)btns+=`<button class="pbtn${i===page?" active":""}" onclick="${fn}(${i})">${i}</button>`;
  document.getElementById(containerId).innerHTML=`<span>Showing ${s}–${e} of ${total}</span><div class="pbtns">${btns}</div>`;
}

function renderDashboard(){
  document.getElementById("topbar-actions").innerHTML="";
  const paid=DB.bills.filter(b=>b.Status==="Paid").reduce((s,b)=>s+b.Amount,0);
  const completed=DB.appointments.filter(a=>a.Status==="Completed").length;
  const avail=DB.doctors.filter(d=>d.Status==="Available").length;
  const avgR=(DB.ratings.reduce((s,r)=>s+r.DoctorRating,0)/DB.ratings.length).toFixed(1);

  const apptSt={Completed:0,Scheduled:0,Cancelled:0};
  DB.appointments.forEach(a=>apptSt[a.Status]=(apptSt[a.Status]||0)+1);
  const billSt={Paid:0,Pending:0,Failed:0};
  DB.bills.forEach(b=>billSt[b.Status]=(billSt[b.Status]||0)+1);
  const deptCnt={};DB.appointments.forEach(a=>deptCnt[a.DepartmentName]=(deptCnt[a.DepartmentName]||0)+1);
  const topDepts=Object.entries(deptCnt).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxD=Math.max(...topDepts.map(x=>x[1]),1);
  const docSt={Available:0,Busy:0,"Off-Duty":0};DB.doctors.forEach(d=>docSt[d.Status]=(docSt[d.Status]||0)+1);

  function srow(lbl,cnt,tot,col){
    const p=tot?Math.round(cnt/tot*100):0;
    return`<div class="srow"><span><span class="sdot" style="background:${col}"></span>${lbl}</span><span style="font-family:var(--mono);font-size:12px">${cnt} <span style="color:var(--text3)">(${p}%)</span></span></div>`;
  }
  const SC={Completed:"#05a67a",Scheduled:"#0a6eba",Cancelled:"#e03a3a",Paid:"#05a67a",Pending:"#f59e0b",Failed:"#e03a3a",Available:"#05a67a",Busy:"#f59e0b","Off-Duty":"#9ba4b0"};
  const atot=Object.values(apptSt).reduce((a,b)=>a+b,0);
  const btot=Object.values(billSt).reduce((a,b)=>a+b,0);
  const dtot=Object.values(docSt).reduce((a,b)=>a+b,0);

  document.getElementById("content").innerHTML=`
  <div class="stats">
    <div class="sc"><div class="sc-lbl">Total Patients</div><div class="sc-val">${DB.patients.length}</div><div class="sc-meta">registered in system</div></div>
    <div class="sc"><div class="sc-lbl">Available Doctors</div><div class="sc-val">${avail}</div><div class="sc-meta warn">${DB.doctors.length} total doctors</div></div>
    <div class="sc"><div class="sc-lbl">Appointments</div><div class="sc-val">${DB.appointments.length}</div><div class="sc-meta up">${completed} completed</div></div>
    <div class="sc"><div class="sc-lbl">Revenue Collected</div><div class="sc-val">$${paid.toLocaleString()}</div><div class="sc-meta up">from paid bills</div></div>
  </div>
  <div class="dg">
    <div class="dc"><div class="dct">Appointment Status</div>
      ${["Completed","Scheduled","Cancelled"].map(s=>srow(s,apptSt[s]||0,atot,SC[s])).join("")}
    </div>
    <div class="dc"><div class="dct">Bill Payment Status</div>
      ${["Paid","Pending","Failed"].map(s=>srow(s,billSt[s]||0,btot,SC[s])).join("")}
      <div class="srow" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><span style="font-weight:500">Total Collected</span><span style="font-family:var(--mono);font-size:13px;color:var(--green);font-weight:500">$${paid.toLocaleString()}</span></div>
    </div>
    <div class="dc"><div class="dct">Top Departments by Appointments</div>
      ${topDepts.map(([n,c])=>`<div class="brow"><span class="blbl">${n}</span><div class="btrack"><div class="bfill" style="width:${c/maxD*100}%;background:var(--accent)"></div></div><span class="bval">${c}</span></div>`).join("")}
    </div>
    <div class="dc"><div class="dct">Doctor Availability</div>
      ${["Available","Busy","Off-Duty"].map(s=>srow(s,docSt[s]||0,dtot,SC[s])).join("")}
      <div class="srow" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><span style="font-weight:500">Avg Doctor Rating</span><span>${sts(parseFloat(avgR))} <span style="font-family:var(--mono);font-size:11px;color:var(--text3)">${avgR}</span></span></div>
    </div>
  </div>`;
}

function pFiltered(){const q=curQ.toLowerCase();return DB.patients.filter(p=>`${p.FirstName} ${p.LastName} ${p.Email} ${p.Phone||""}`.toLowerCase().includes(q));}
function drawPatients(){

function openPatientModal(){document.getElementById("pm-title").textContent="Add Patient";openModal("patient-modal");}
function editPatient(id){
  const p=DB.patients.find(x=>x.PatientID===id);
  document.getElementById("pm-title").textContent="Edit Patient";
  document.getElementById("edit-id").value=id;
  document.getElementById("pf-first").value=p.FirstName;
  document.getElementById("pf-last").value=p.LastName;
  document.getElementById("pf-email").value=p.Email;
  document.getElementById("pf-phone").value=p.Phone||"";
  document.getElementById("pf-dob").value=p.DateOfBirth;
  document.getElementById("pf-gender").value=p.Gender;
  openModal("patient-modal");
}
function savePatient(){
  const v=id=>document.getElementById(id).value.trim();
  const err=(id,msg)=>{document.getElementById(id).textContent=msg;};
  ["pe-first","pe-last","pe-email","pe-dob","pe-gender"].forEach(id=>err(id,""));
  let ok=true;
  if(!v("pf-first")){err("pe-first","Required");ok=false;}
  if(!v("pf-last")){err("pe-last","Required");ok=false;}
  if(!v("pf-email")||!v("pf-email").includes("@")){err("pe-email","Valid email required");ok=false;}
  if(!v("pf-dob")){err("pe-dob","Required");ok=false;}
  if(!v("pf-gender")){err("pe-gender","Required");ok=false;}
  if(!ok)return;
  const id=parseInt(document.getElementById("edit-id").value||0);
  const obj={FirstName:v("pf-first"),LastName:v("pf-last"),Email:v("pf-email"),Phone:v("pf-phone")||null,DateOfBirth:v("pf-dob"),Gender:v("pf-gender"),RegistrationDate:new Date().toISOString().slice(0,10)};
  if(id){const i=DB.patients.findIndex(x=>x.PatientID===id);DB.patients[i]={...DB.patients[i],...obj};toast("Patient updated!");}
  else{DB.patients.unshift({PatientID:nextId.patients++,...obj});toast("Patient added!");}
  closeModal("patient-modal");drawPatients();
}
async function delPatient(id){
  if(!await confirm2("Delete this patient? Their appointments will also be removed."))return;
  const i=DB.patients.findIndex(x=>x.PatientID===id);DB.patients.splice(i,1);
  toast("Patient deleted");drawPatients();
}

  <div class="tc">
    <div class="tc-head"><span class="tc-title">Ratings</span><span class="tc-cnt" id="rt-cnt"></span><span style="margin-left:auto;font-size:12px;color:var(--text3)" id="rt-avg"></span></div>
    <table><thead><tr><th>ID</th><th>Appt.</th><th>Patient</th><th>Doctor</th><th>Doctor Rating</th><th>Patient Rating</th><th>Comment</th><th>Actions</th></tr></thead>
    <tbody id="rt-body"></tbody></table>
    <div class="pag" id="rt-pag"></div>
  </div>
  <div class="mb" id="rating-modal">
    <div class="modal">
      <div class="mhd"><span class="mtitle" id="rtm-title">Add Rating</span><button class="mclose" onclick="closeModal('rating-modal')">×</button></div>
      <div class="mbody">
        <input type="hidden" id="edit-id">
        <div class="fgrid">
          <div class="fg full"><label class="flbl">Appointment<span>*</span></label><select class="fsel" id="rtf-appt"><option value="">Select…</option>${DB.appointments.map(a=>`<option value="${a.AppointmentID}">#${a.AppointmentID} — ${a.PatientName} (${a.Status})</option>`).join("")}</select><span class="ferr" id="rte-appt"></span></div>
          <div class="fg"><label class="flbl">Doctor Rating (1–5)<span>*</span></label><select class="fsel" id="rtf-dr"><option value="">Select…</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n} ${"★".repeat(n)}</option>`).join("")}</select><span class="ferr" id="rte-dr"></span></div>
          <div class="fg"><label class="flbl">Patient Rating (1–5)</label><select class="fsel" id="rtf-pr"><option value="">None</option>${[1,2,3,4,5].map(n=>`<option value="${n}">${n} ${"★".repeat(n)}</option>`).join("")}</select></div>
          <div class="fg full"><label class="flbl">Comment</label><textarea class="fta" id="rtf-comment" placeholder="Optional feedback…"></textarea></div>
        </div>
      </div>
      <div class="mfoot"><button class="btn btn-outline" onclick="closeModal('rating-modal')">Cancel</button><button class="btn btn-primary" onclick="saveRating()">Save Rating</button></div>
    </div>
  </div>`;
  drawRatings();
}
function drawRatings(){
  const data=DB.ratings,slice=data.slice((curP-1)*PER,curP*PER);
  const avg=data.length?(data.reduce((s,r)=>s+r.DoctorRating,0)/data.length).toFixed(1):"—";
  document.getElementById("rt-cnt").textContent=`${data.length} records`;
  document.getElementById("rt-avg").textContent=`Avg doctor rating: ★ ${avg}`;
  document.getElementById("rt-body").innerHTML=slice.length?slice.map(r=>`
    <tr>
      <td class="tdid">#${r.RatingID}</td><td class="tdid">APT-${r.AppointmentID}</td>
      <td class="tdbold">${r.PatientName}</td><td style="color:var(--accent)">${r.DoctorName}</td>
      <td>${sts(r.DoctorRating)}</td>
      <td>${r.PatientRating?sts(r.PatientRating):'<span class="tdmuted">—</span>'}</td>
      <td class="tdmuted" style="font-style:italic;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.Comment||"—"}</td>
      <td><div class="acel"><button class="btn btn-outline btn-sm" onclick="editRating(${r.RatingID})">✏ Edit</button><button class="btn btn-danger btn-sm" onclick="delRating(${r.RatingID})">✕</button></div></td>
    </tr>`).join(""):`<tr><td colspan="8"><div class="empty"><div class="eico">⭐</div><p>No ratings found</p></div></td></tr>`;
  pag("rt-pag",data.length,curP,PER,"rtGoPage");
}
function rtGoPage(n){curP=n;drawRatings();}
function openRatingModal(){document.getElementById("rtm-title").textContent="Add Rating";openModal("rating-modal");}
function editRating(id){
  const r=DB.ratings.find(x=>x.RatingID===id);
  document.getElementById("rtm-title").textContent="Edit Rating";
  document.getElementById("edit-id").value=id;
  document.getElementById("rtf-appt").value=r.AppointmentID;
  document.getElementById("rtf-dr").value=r.DoctorRating;
  document.getElementById("rtf-pr").value=r.PatientRating||"";
  document.getElementById("rtf-comment").value=r.Comment||"";
  openModal("rating-modal");
}
function saveRating(){
  const v=id=>document.getElementById(id).value.trim();
  let ok=true;
  ["rte-appt","rte-dr"].forEach(id=>document.getElementById(id).textContent="");
  if(!v("rtf-appt")){document.getElementById("rte-appt").textContent="Required";ok=false;}
  if(!v("rtf-dr")){document.getElementById("rte-dr").textContent="Required";ok=false;}
  if(!ok)return;
  const appt=DB.appointments.find(a=>a.AppointmentID===parseInt(v("rtf-appt")));
  const doc=DB.doctors.find(d=>d.DoctorID===appt?.DoctorID);
  const id=parseInt(document.getElementById("edit-id").value||0);
  const obj={AppointmentID:parseInt(v("rtf-appt")),PatientName:appt?.PatientName||"",DoctorName:`Dr. ${doc?.FirstName||""} ${doc?.LastName||""}`,DoctorRating:parseInt(v("rtf-dr")),PatientRating:v("rtf-pr")?parseInt(v("rtf-pr")):null,Comment:v("rtf-comment")||null};
  if(id){const i=DB.ratings.findIndex(x=>x.RatingID===id);DB.ratings[i]={...DB.ratings[i],...obj};toast("Rating updated!");}
  else{DB.ratings.unshift({RatingID:nextId.ratings++,...obj});toast("Rating added!");}
  closeModal("rating-modal");drawRatings();
}
async function delRating(id){
  if(!await confirm2("Delete this rating?"))return;
  DB.ratings.splice(DB.ratings.findIndex(x=>x.RatingID===id),1);
  toast("Rating deleted");drawRatings();
}

// ══════════════════════════════════════════════
//  PROMOTIONS
// ══════════════════════════════════════════════
function renderPromotions(){
  document.getElementById("topbar-actions").innerHTML=`<button class="btn btn-primary" onclick="openPromoModal()">+ Add Promotion</button>`;
  document.getElementById("content").innerHTML=`
  <div class="tc">
    <div class="tc-head"><span class="tc-title">Promotions</span><span class="tc-cnt" id="pr-cnt"></span></div>
    <table><thead><tr><th>ID</th><th>Code</th><th>Discount</th><th>Expiry Date</th><th>Times Used</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody id="pr-body"></tbody></table>
    <div class="pag" id="pr-pag"></div>
  </div>
  <div class="mb" id="promo-modal">
    <div class="modal">
      <div class="mhd"><span class="mtitle" id="prm-title">Add Promotion</span><button class="mclose" onclick="closeModal('promo-modal')">×</button></div>
      <div class="mbody">
        <input type="hidden" id="edit-id">
        <div class="fgrid">
          <div class="fg"><label class="flbl">Promo Code<span>*</span></label><input class="fi" id="prf-code" placeholder="SUMMER25" style="text-transform:uppercase"><span class="ferr" id="pre-code"></span></div>
          <div class="fg"><label class="flbl">Discount % (0–100)<span>*</span></label><input class="fi" id="prf-disc" type="number" min="0" max="100" step="0.1" placeholder="10"><span class="ferr" id="pre-disc"></span></div>
          <div class="fg"><label class="flbl">Expiry Date<span>*</span></label><input class="fi" id="prf-exp" type="date"><span class="ferr" id="pre-exp"></span></div>
        </div>
      </div>
      <div class="mfoot"><button class="btn btn-outline" onclick="closeModal('promo-modal')">Cancel</button><button class="btn btn-primary" onclick="savePromo()">Save Promotion</button></div>
    </div>
  </div>`;
  drawPromos();
}
function drawPromos(){
  const data=DB.promotions,slice=data.slice((curP-1)*PER,curP*PER);
  const today=new Date().toISOString().slice(0,10);
  document.getElementById("pr-cnt").textContent=`${data.length} records`;
  document.getElementById("pr-body").innerHTML=slice.map(p=>`
    <tr>
      <td class="tdid">#${p.PromoID}</td>
      <td style="font-family:var(--mono);font-weight:700;letter-spacing:.06em;font-size:13px">${p.Code}</td>
      <td style="font-family:var(--mono);font-size:18px;font-weight:300;color:var(--green)">${p.Discount}%</td>
      <td class="tdmono tdmuted">${p.ExpiryDate}</td>
      <td class="tdmono">${p.TimesUsed||0}</td>
      <td>${p.ExpiryDate>=today?'<span class="bdg bg">Active</span>':'<span class="bdg br">Expired</span>'}</td>
      <td><div class="acel"><button class="btn btn-outline btn-sm" onclick="editPromo(${p.PromoID})">✏ Edit</button><button class="btn btn-danger btn-sm" onclick="delPromo(${p.PromoID})">✕</button></div></td>
    </tr>`).join("");
  pag("pr-pag",data.length,curP,PER,"prGoPage");
}
function prGoPage(n){curP=n;drawPromos();}
function openPromoModal(){document.getElementById("prm-title").textContent="Add Promotion";openModal("promo-modal");}
function editPromo(id){
  const p=DB.promotions.find(x=>x.PromoID===id);
  document.getElementById("prm-title").textContent="Edit Promotion";
  document.getElementById("edit-id").value=id;
  document.getElementById("prf-code").value=p.Code;
  document.getElementById("prf-disc").value=p.Discount;
  document.getElementById("prf-exp").value=p.ExpiryDate;
  openModal("promo-modal");
}
function savePromo(){
  const v=id=>document.getElementById(id).value.trim();
  let ok=true;
  ["pre-code","pre-disc","pre-exp"].forEach(id=>document.getElementById(id).textContent="");
  if(!v("prf-code")){document.getElementById("pre-code").textContent="Required";ok=false;}
  const disc=parseFloat(v("prf-disc"));if(isNaN(disc)||disc<0||disc>100){document.getElementById("pre-disc").textContent="Must be 0–100";ok=false;}
  if(!v("prf-exp")){document.getElementById("pre-exp").textContent="Required";ok=false;}
  if(!ok)return;
  const id=parseInt(document.getElementById("edit-id").value||0);
  const obj={Code:v("prf-code").toUpperCase(),Discount:disc,ExpiryDate:v("prf-exp"),TimesUsed:0};
  if(id){const i=DB.promotions.findIndex(x=>x.PromoID===id);DB.promotions[i]={...DB.promotions[i],...obj};toast("Promotion updated!");}
  else{DB.promotions.push({PromoID:nextId.promotions++,...obj});toast("Promotion added!");}
  closeModal("promo-modal");drawPromos();
}
async function delPromo(id){
  if(!await confirm2("Delete this promotion?"))return;
  DB.promotions.splice(DB.promotions.findIndex(x=>x.PromoID===id),1);
  toast("Promotion deleted");drawPromos();
}

// Boot
renderDashboard();
</script>
</body>
</html>
